  #          cri-containerd.test.exe -cri-endpoint="npipe://./pipe/containerd-containerd" -feature="WCOWProcess" -feature="HostProcess"

  build:
    needs: [test-windows, test-linux]
    runs-on: "windows-2022"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Install Go
        uses: ./.github/actions/setup-go

      - name: Build Binaries
        shell: pwsh
        run: |
          cmake -S "${{ github.workspace }}" --preset "x64-release"
          if ( $LASTEXITCODE ) {
            Write-Output '::error::Could not generate CMake build.'
            exit $LASTEXITCODE
          }

          cmake --build "${{ github.workspace }}/out/x64-release/build" --target build_all

      # validation for (mostly) unused lcow-/wcow-tagged code
      - run: ${{ env.GO_BUILD_CMD }} -tags lcow ./...
        name: Build lcow tagged packages (shimV2)
      - run: ${{ env.GO_BUILD_CMD }} -tags wcow ./...
        name: Build wcow tagged packages (shimV2)
      - run: ${{ env.GO_BUILD_CMD }} ./...
        name: Build untagged packages

      - uses: actions/upload-artifact@v7
        if: ${{ github.event_name == 'pull_request' }}
        with:
          name: binaries
          path: |
            ${{ github.workspace }}/out/x64-release/bin/*

  build_gcs:
    needs: test-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Install Go
        uses: ./.github/actions/setup-go

      - name: Set version info
        shell: pwsh
        run: |
          # ignore errors since they won't affect build
          try {
            ./scripts/Set-VersionInfo.ps1
          } catch {
            Write-Output "::warning::Could not set hcsshim version info: $_"
          } finally {
            $LASTEXITCODE = 0
          }

      - name: Test
        run: make test

      - name: Pull busybox image
        run: docker pull busybox

      - name: Run Busybox Container
        run: docker run --name base_image_container busybox

      - name: Export container to tar file
        run: |
          docker export base_image_container | gzip > base.tar.gz

      - name: Build
        run: make BASE=./base.tar.gz all
